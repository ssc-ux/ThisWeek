# Numéro de démonstration — contenu ENTIÈREMENT FICTIF (demo: true).
# Il illustre le format en attendant le premier numéro réel.
# Schéma d'un numéro : voir site/build.py et docs/exemple-digest.md.

numero: 0
semaine: "6 au 12 juillet 2026"
date: 2026-07-12
demo: true
relecteur: "Dr Exemple (interniste)"
edito: >-
  Semaine dominée par les recommandations : une actualisation européenne
  attendue en auto-immunité, un PNDS remis à jour, et un essai qui tranche
  enfin une question ancienne. Quatre items, douze minutes de lecture.

items:
  - type: reco
    titre: "Actualisation des recommandations européennes — prise en charge d'une maladie systémique (exemple fictif)"
    source: "Société savante européenne · revue de rhumatologie"
    url: "https://example.org/reco-fictive"
    base_texte: texte_integral
    resume: >-
      La société savante actualise ses recommandations de 2021 sur la prise en
      charge de cette maladie systémique. Le texte couvre le diagnostic, la
      stratification du risque et les traitements d'induction et d'entretien.
      Les changements principaux portent sur la place d'une biothérapie en
      première ligne dans les formes sévères et sur un calendrier de
      décroissance de la corticothérapie plus rapide qu'auparavant.
    ce_qui_change:
      reference: "version 2021"
      points:
        - "La biothérapie X passe d'option de recours à option de première
          ligne dans les formes sévères, sur la foi d'un essai randomisé publié
          en 2025."
        - "Objectif de décroissance des corticoïdes accéléré : seuil cible
          atteint à 3 mois au lieu de 6."
        - "Nouvelle section dédiée à la grossesse, absente de la version
          antérieure."
    message_cle: >-
      Dans les formes sévères, discuter la biothérapie X d'emblée plutôt
      qu'après échec, et viser une décroissance des corticoïdes plus rapide que
      la pratique courante actuelle.
    contexte: >-
      Recommandation fondée sur deux essais randomisés et une méta-analyse
      (niveau de preuve élevé pour la première ligne, avis d'experts pour la
      grossesse). Point de divergence avec la recommandation américaine de
      2024, qui maintient la biothérapie X en seconde ligne. Pas de PNDS
      français actualisé sur ce sujet à ce jour ; en pratique française, la
      prescription dans cette indication reste hors AMM.

  - type: pnds
    titre: "PNDS actualisé — maladie rare de l'adulte (exemple fictif)"
    source: "Filière de santé maladies rares · HAS"
    url: "https://example.org/pnds-fictif"
    base_texte: texte_integral
    resume: >-
      Actualisation du PNDS de 2019. Le protocole précise le parcours
      diagnostique, hiérarchise les examens de première intention et introduit
      un algorithme de suivi commun aux centres de référence et aux centres de
      compétence.
    ce_qui_change:
      reference: "PNDS 2019"
      points:
        - "Le dosage biologique Y devient l'examen de première intention, avant
          l'imagerie."
        - "Rythme de suivi allégé pour les formes stables (annuel au lieu de
          semestriel)."
    message_cle: >-
      Le parcours diagnostique commence désormais par le dosage Y ; les formes
      stables relèvent d'un suivi annuel.
    contexte: >-
      Le PNDS conditionne la prise en charge en ALD ; cette version aligne la
      stratégie française sur le consensus international publié en 2024.

  - type: essai
    titre: "Essai randomisé — durée de traitement dans une situation fréquente en médecine interne (exemple fictif)"
    source: "Grande revue généraliste"
    url: "https://example.org/essai-fictif"
    base_texte: abstract_seul
    resume: >-
      Essai multicentrique de non-infériorité comparant une durée courte à la
      durée standard de traitement. Sur le critère principal composite à 90
      jours, la durée courte est non inférieure à la durée standard, avec
      moins d'effets indésirables.
    ce_qui_change:
      reference: "pratique antérieure"
      points:
        - "Premier essai randomisé de puissance suffisante sur cette question,
          jusqu'ici tranchée par des études observationnelles discordantes."
    message_cle: >-
      La durée courte devient une option solide chez les patients comparables
      à ceux de l'essai ; attention aux critères d'exclusion avant
      extrapolation.
    contexte: >-
      Population sélectionnée (exclusion des patients immunodéprimés et des
      formes compliquées), ce qui limite l'extrapolation aux patients
      hospitalisés en médecine interne. Les recommandations en vigueur
      devraient être mises à jour en conséquence.

  - type: alerte
    titre: "Alerte de pharmacovigilance — médicament d'usage courant (exemple fictif)"
    source: "Agence du médicament"
    url: "https://example.org/alerte-fictive"
    resume: >-
      Signal confirmé d'un effet indésirable rare mais grave. L'agence
      recommande une surveillance biologique renforcée en début de traitement
      et rappelle les situations à risque.
    message_cle: >-
      Surveillance biologique renforcée le premier mois ; réévaluer
      l'indication chez les patients cumulant les facteurs de risque.
    contexte: >-
      Signal issu de la pharmacovigilance européenne ; l'incidence estimée
      reste faible et le rapport bénéfice/risque demeure favorable dans les
      indications validées.

