# Numéro réel rédigé à partir des abstracts PubMed (brouillon, non relu).
# Périmètre : médecine interne (amylose, sarcoïdose, lupus).
numero: 3
semaine: "4 au 10 juillet 2026"
date: 2026-07-10
brouillon: true
edito: >-
  Trois maladies systémiques de l'adulte cette semaine : un anticorps
  antifibrilles dans l'amylose AL (résultat nuancé), un essai négatif dans la
  sarcoïdose pulmonaire, et une synthèse au long cours de l'anifrolumab dans
  le lupus.

items:
  - type: essai
    titre: "Anselamimab dans l'amylose à chaînes légères (AL) : essais CARES"
    source: "Journal of Clinical Oncology · essais randomisés de phase 3"
    url: "https://pubmed.ncbi.nlm.nih.gov/42212672/"
    base_texte: abstract_seul
    resume: >-
      Chez 406 patients avec amylose AL de stade IIIa/IIIb nouvellement
      diagnostiquée, l'anselamimab (anticorps se liant aux fibrilles amyloïdes)
      a été ajouté au traitement standard (cyclophosphamide-bortézomib-
      dexaméthasone ± daratumumab). Le critère de jugement PRINCIPAL hiérarchique
      (mortalité toutes causes et hospitalisations cardiovasculaires) n'est PAS
      atteint (win ratio 1,11 ; p = 0,332) : l'essai est négatif dans la
      population globale. Une analyse de sous-groupe exploratoire (chaînes légères
      kappa, n = 72), génératrice d'hypothèses, suggère un signal favorable
      sur la mortalité et les hospitalisations cardiovasculaires, sans signal dans
      les formes lambda — un résultat secondaire qui ne constitue pas une preuve
      d'efficacité.
    message_cle: >-
      Essai négatif : l'anselamimab ne démontre pas de bénéfice dans l'amylose AL.
      Le signal du sous-groupe kappa n'est qu'exploratoire et ne modifie pas la
      prise en charge actuelle ; à confirmer par un essai dédié.
    contexte:
      - >-
        L'amylose à chaînes légères (AL) résulte du dépôt tissulaire de fibrilles
        d'immunoglobulines produites par un clone plasmocytaire. C'est une
        maladie systémique rare, souvent diagnostiquée tardivement, dont le
        pronostic dépend surtout de l'atteinte cardiaque (stades de Mayo). Elle
        se situe au carrefour de la médecine interne, de l'hématologie et de la
        cardiologie.
      - >-
        Le traitement actuel vise le clone plasmocytaire sous-jacent
        (association cyclophosphamide-bortézomib-dexaméthasone, désormais
        renforcée par le daratumumab) pour tarir la production de chaînes
        légères. Mais réduire la source ne dissout pas les dépôts déjà présents :
        d'où l'idée d'anticorps « antifibrilles » (comme l'anselamimab) capables
        d'accélérer la clairance de l'amyloïde déjà déposée dans les organes.
      - >-
        Les essais CARES sont négatifs sur leur critère principal (mortalité et
        hospitalisations cardiovasculaires) dans la population globale. Un signal
        fort apparaît toutefois dans le sous-groupe des chaînes légères kappa —
        mais il s'agit d'une analyse de sous-groupe, génératrice d'hypothèses,
        qui ne peut pas à elle seule changer la pratique.
      - >-
        En France, l'amylose AL est prise en charge en lien avec le Centre de
        référence (amylose AL et autres maladies de dépôt d'immunoglobulines) ;
        ce résultat conforte l'attente d'essais dédiés avant d'intégrer un
        anticorps antifibrilles à la stratégie.

  - type: essai
    titre: "Namilumab dans la sarcoïdose pulmonaire chronique : essai négatif (RESOLVE-Lung)"
    source: "European Respiratory Journal · essai de phase 2"
    impact_factor: 24
    url: "https://pubmed.ncbi.nlm.nih.gov/41819539/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 2 randomisé contre placebo chez 107 patients atteints de
      sarcoïdose pulmonaire chronique active sous corticoïdes et/ou
      immunosuppresseurs, avec sevrage imposé. Le namilumab (anti-GM-CSF, 150 mg
      SC/4 semaines) n'a pas réduit les événements de recours thérapeutique
      (37,5 % vs 23,5 % sous placebo ; p = 0,12), sans bénéfice sur la CVF ni sur
      l'épargne cortisonique (sevrage réussi chez 53,3 % vs 76,9 % sous placebo).
    message_cle: >-
      Le namilumab n'apporte pas de bénéfice dans la sarcoïdose pulmonaire
      chronique — les options d'épargne cortisonique restent limitées
      (méthotrexate, azathioprine, anti-TNF en recours).
    contexte:
      - >-
        La sarcoïdose est une granulomatose systémique de cause inconnue, suivie
        en grande partie en médecine interne. L'atteinte pulmonaire est la plus
        fréquente ; beaucoup de formes régressent, mais une minorité évolue vers
        une maladie chronique, fibrosante, source de handicap respiratoire.
      - >-
        Le traitement de première ligne reste la corticothérapie, avec en
        deuxième ligne le méthotrexate ou l'azathioprine, et les anti-TNF
        (infliximab) en recours. Toutes ces options ont une efficacité et une
        tolérance imparfaites, et l'épargne cortisonique est un besoin non
        couvert — d'où l'intérêt de cibler des voies impliquées dans la formation
        du granulome, comme le GM-CSF (namilumab).
      - >-
        L'essai est négatif : pas de réduction des recours thérapeutiques, pas de
        bénéfice sur la fonction respiratoire, et une épargne cortisonique
        paradoxalement moins bonne que sous placebo. Le protocole imposait un
        sevrage des immunosuppresseurs, ce qui a pu déstabiliser des patients par
        ailleurs contrôlés.
      - >-
        Résultat utile pour tempérer les attentes autour de l'anti-GM-CSF et
        réorienter la recherche. En pratique, la stratégie de la sarcoïdose
        réfractaire ne change pas.

  - type: meta
    titre: "Anifrolumab au long cours dans le lupus systémique : méta-analyse (essais, extensions, vie réelle)"
    source: "Pharmacology · méta-analyse"
    url: "https://pubmed.ncbi.nlm.nih.gov/42406697/"
    base_texte: abstract_seul
    resume: >-
      Méta-analyse de 10 études (essais de phase 2/3, extensions TULIP/MUSE et
      quatre cohortes européennes de vie réelle) sur l'anifrolumab (antagoniste
      du récepteur de l'interféron de type I) dans le lupus modéré à sévère.
      Dans les essais (N = 1 093) : meilleure réponse BICLA (OR 1,85) et
      meilleure épargne cortisonique ≤ 7,5 mg/j (OR 2,24). En vie réelle
      (N = 294), 75,8 % atteignaient un état de faible activité (LLDAS) à
      6–12 mois. Surrisque de zona (OR 3,45), le plus souvent modéré et gérable.
    message_cle: >-
      L'anifrolumab confirme au long cours un contrôle rapide et durable du
      lupus et un effet d'épargne cortisonique, au prix d'un surrisque de zona
      justifiant la vaccination préventive.
    contexte:
      - >-
        Dans le lupus systémique, la voie de l'interféron de type I joue un rôle
        physiopathologique central, en particulier dans les atteintes cutanées
        et articulaires. L'anifrolumab, anticorps bloquant le récepteur de
        l'interféron de type I, a obtenu une AMM dans le lupus modéré à sévère
        après les essais TULIP.
      - >-
        Les essais pivots ont une durée limitée ; or le lupus est une maladie
        chronique. Cette méta-analyse combine les données d'essais, leurs
        extensions à long terme (TULIP-LTE, MUSE-LTE) et des cohortes
        européennes de vie réelle, pour approcher l'efficacité et la tolérance
        « en conditions réelles » et sur plusieurs années.
      - >-
        Les résultats sont cohérents et rassurants : réponse clinique (BICLA),
        atteinte fréquente d'un état de faible activité (LLDAS) et surtout
        épargne cortisonique — objectif majeur pour limiter les dommages à long
        terme. Le principal signal de tolérance est un surrisque de zona,
        d'où la recommandation de vacciner avant l'immunosuppression.
      - >-
        Limite : méta-analyse mêlant des designs hétérogènes (essais et vie
        réelle), avec le risque de biais propre aux cohortes observationnelles.
        Le résultat conforte néanmoins la place de l'anifrolumab dans le lupus
        cutanéo-articulaire réfractaire.

aussi_parus:
  - titre: "Risque infectieux des biothérapies et traitements ciblés dans la polyarthrite rhumatoïde : revue systématique"
    source: "European Journal of Clinical Pharmacology"
    url: "https://pubmed.ncbi.nlm.nih.gov/42426413/"
    resume: >-
      Revue systématique et méta-analyse en réseau du risque infectieux des
      biothérapies et traitements ciblés (b/tsDMARDs) dans la polyarthrite
      rhumatoïde, en monothérapie ou associés au méthotrexate, avec les
      infections graves comme critère principal. Objectif : hiérarchiser le
      risque infectieux entre classes pour éclairer le choix thérapeutique.
