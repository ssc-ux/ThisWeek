# Numéro réel rédigé à partir des abstracts PubMed (brouillon, non relu).
# Périmètre : médecine interne (maladies auto-immunes et systémiques, vascularites,
# hématologie non maligne).
numero: 2
semaine: "27 juin au 3 juillet 2026"
date: 2026-07-03
brouillon: true
edito: >-
  Semaine dense et très « médecine interne » : une recommandation majeure sur
  le traitement du lupus, deux essais négatifs utiles (Horton, PTI) qui
  recadrent les attentes, un signal positif dans la maladie de Behçet, et un
  consensus sur le purpura thrombotique thrombocytopénique.

items:
  - type: reco
    titre: "Recommandation ACR 2025 pour le traitement du lupus systémique (hors atteinte rénale)"
    source: "Arthritis & Rheumatology · American College of Rheumatology"
    url: "https://pubmed.ncbi.nlm.nih.gov/41187097/"
    base_texte: abstract_seul
    resume: >-
      Recommandation de l'ACR (méthodologie GRADE, accord ≥ 70 % du panel) sur
      le traitement du lupus non rénal, applicable à l'adulte et à l'enfant (la
      néphrite lupique fait l'objet d'un texte séparé). Trois axes forts :
      hydroxychloroquine pour tous, limitation de la durée de la corticothérapie,
      et introduction précoce des immunosuppresseurs conventionnels et/ou des
      biothérapies pour obtenir et maintenir un contrôle de l'inflammation
      (rémission ou faible activité), réduire la morbimortalité et les toxicités
      médicamenteuses.
    ce_qui_change:
      reference: "pratiques centrées sur la corticothérapie"
      points:
        - "Hydroxychloroquine posée comme traitement de fond universel."
        - "Corticothérapie à limiter dans le temps, au profit d'une introduction
          plus précoce des immunosuppresseurs et biothérapies."
    message_cle: >-
      Dans le lupus : hydroxychloroquine pour tous, épargne cortisonique, et
      immunosuppression/biothérapie précoce pour viser la rémission ou une
      faible activité.
    contexte:
      - >-
        Le lupus systémique est une maladie prototypique de la médecine interne.
        Sa prise en charge a longtemps reposé sur les corticoïdes, dont la
        toxicité cumulée (os, métabolisme, infections, cardiovasculaire) est
        aujourd'hui reconnue comme un déterminant majeur des dommages à long
        terme — d'où un changement de paradigme vers l'épargne cortisonique.
      - >-
        L'ACR (American College of Rheumatology) actualise ici ses
        recommandations de traitement du lupus non rénal, avec une méthodologie
        GRADE et un vote d'experts. Le texte couvre l'adulte et l'enfant ; la
        néphrite lupique, prise en charge souvent conjointement avec le
        néphrologue, fait l'objet d'un document séparé.
      - >-
        Les trois messages structurants — hydroxychloroquine pour tous,
        limitation de la durée des corticoïdes, introduction précoce des
        immunosuppresseurs et biothérapies pour viser la rémission ou une faible
        activité (logique « treat-to-target ») — convergent avec les
        recommandations EULAR et l'arrivée de nouvelles biothérapies
        (bélimumab, anifrolumab) qui rendent l'épargne cortisonique plus
        atteignable.
      - >-
        Pour la pratique française : recommandation nord-américaine, à
        confronter aux référentiels EULAR/filière FAI²R et à la disponibilité,
        l'AMM et le remboursement des biothérapies. Elle ne traite pas la
        néphrite lupique.

  - type: essai
    titre: "Sécukinumab dans l'artérite à cellules géantes (Horton) : essai négatif (GCAptAIN)"
    source: "NEJM Evidence · essai de phase 3"
    url: "https://pubmed.ncbi.nlm.nih.gov/42234457/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 3 randomisé contre placebo chez des patients atteints
      d'artérite à cellules géantes (nouvelle ou en rechute). Le sécukinumab
      300 mg (avec décroissance des corticoïdes sur 26 semaines) n'a pas
      significativement amélioré la rémission soutenue à 52 semaines : 25,6 % vs
      16,9 % sous placebo (différence 8,7 points ; IC95 % −1,3 à 18,8 ;
      p = 0,09). Pas de bénéfice non plus à 150 mg. Effets indésirables graves
      un peu moins fréquents sous sécukinumab.
    message_cle: >-
      Le sécukinumab n'a pas fait la preuve de son efficacité dans l'artérite à
      cellules géantes — le tocilizumab reste la biothérapie d'épargne
      cortisonique de référence.
    contexte:
      - >-
        L'artérite à cellules géantes (maladie de Horton) est la vascularite la
        plus fréquente après 50 ans, urgence diagnostique en raison du risque de
        cécité. Son traitement repose sur des corticoïdes prolongés, mais les
        rechutes et la toxicité cortisonique sont fréquentes chez des patients
        souvent âgés et polypathologiques — d'où la recherche de traitements
        d'épargne.
      - >-
        Le tocilizumab (anti-IL-6) a démontré son efficacité (essai GiACTA) et
        est devenu le traitement d'épargne cortisonique de référence. La
        question posée par GCAptAIN était de savoir si le blocage d'une autre
        voie inflammatoire, l'IL-17A (sécukinumab, déjà utilisé dans le
        psoriasis et les spondyloarthrites), pouvait aussi être efficace.
      - >-
        Le résultat est négatif : pas de différence significative sur la
        rémission soutenue à 52 semaines. C'est un enseignement utile — il
        n'était pas acquis qu'un succès de l'anti-IL-17A dans le psoriasis se
        transpose à une vascularite des gros vaisseaux. Cela ne modifie pas la
        stratégie (corticoïdes ± tocilizumab).
      - >-
        À noter : les effets indésirables graves étaient un peu moins fréquents
        sous sécukinumab, en partie parce que le bras placebo recevait une
        décroissance cortisonique plus lente (52 semaines vs 26), rappelant que
        la toxicité des corticoïdes est elle-même un comparateur.

  - type: essai
    titre: "Mufemilast dans la maladie de Behçet : essai de phase 2"
    source: "Annals of the Rheumatic Diseases · essai de phase 2"
    url: "https://pubmed.ncbi.nlm.nih.gov/41748391/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 2 randomisé contre placebo chez 90 patients atteints de
      maladie de Behçet avec aphtose buccale active. Le mufemilast (inhibiteur
      oral sélectif de la PDE4, 45 ou 60 mg × 2/j, 12 semaines) a réduit l'aire
      sous la courbe du nombre d'ulcères buccaux (différence −104,8 à −142,5 vs
      placebo ; p < 0,001), avec amélioration de la douleur et du délai de
      rémission. Effets indésirables liés à la PDE4 transitoires, arrêts rares,
      aucun effet grave lié au traitement.
    message_cle: >-
      Un inhibiteur oral de la PDE4 réduit l'aphtose buccale du Behçet en
      phase 2 — piste intéressante dans l'atteinte muqueuse, à confirmer en
      phase 3.
    contexte:
      - >-
        La maladie de Behçet est une vascularite systémique à la croisée de
        l'auto-immunité et de l'auto-inflammation, suivie en médecine interne.
        L'aphtose buccale récidivante en est la manifestation la plus fréquente
        et la plus altérante pour la qualité de vie, mais la maladie peut aussi
        toucher l'œil, les vaisseaux et le système nerveux — atteintes graves
        qui dominent le pronostic.
      - >-
        Les inhibiteurs de la phosphodiestérase-4 (PDE4) agissent sur
        l'inflammation par voie orale ; l'aprémilast, de la même classe, a déjà
        montré un bénéfice sur l'aphtose du Behçet (essai RELIEF) et dispose
        d'une AMM dans cette indication. Le mufemilast est un nouvel inhibiteur
        de PDE4 évalué ici en phase 2.
      - >-
        Le résultat est positif sur le critère choisi — la charge en ulcères
        buccaux — avec une bonne tolérance. Mais le critère ne concerne que
        l'atteinte muqueuse : rien n'est démontré sur les atteintes sévères
        (oculaire, vasculaire, neurologique) qui font la gravité de la maladie.
      - >-
        Preuve de phase 2 à confirmer en phase 3. L'intérêt pratique serait une
        option orale supplémentaire dans l'aphtose réfractaire, à situer à côté
        de la colchicine, de l'aprémilast et des biothérapies.

  - type: essai
    titre: "Efgartigimod sous-cutané dans le purpura thrombopénique immunologique : essai négatif (ADVANCE SC)"
    source: "American Journal of Hematology · essai de phase 3"
    url: "https://pubmed.ncbi.nlm.nih.gov/41943179/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 3 chez 207 adultes atteints de PTI primaire (plaquettes
      < 30 G/L, ≥ 1 traitement antérieur), randomisés 2:1 entre efgartigimod
      PH20 sous-cutané et placebo. La supériorité n'a pas été démontrée : réponse
      plaquettaire soutenue (≥ 50 G/L sur au moins 4 des 6 visites S19–24) chez
      13,7 % (efgartigimod) contre 16,2 % (placebo ; p = 0,51). Tolérance bonne
      et comparable. Réponses placebo plus élevées et réponses efgartigimod plus
      basses qu'attendu.
    message_cle: >-
      La forme sous-cutanée d'efgartigimod n'a pas confirmé son efficacité dans
      le PTI dans cet essai — résultat discordant avec la forme IV (ADVANCE IV),
      à interpréter avec prudence.
    contexte:
      - >-
        Le purpura thrombopénique immunologique (PTI) est une cytopénie
        auto-immune fréquente en médecine interne, liée à la destruction et à la
        production insuffisante de plaquettes. Après la corticothérapie de
        première ligne, les options des formes chroniques incluent les agonistes
        du récepteur de la thrombopoïétine, le rituximab et la splénectomie.
      - >-
        L'efgartigimod bloque le récepteur néonatal FcRn, accélérant la
        dégradation des IgG — donc des auto-anticorps antiplaquettes. Sa forme
        intraveineuse avait montré un bénéfice dans le PTI chronique (essai
        ADVANCE IV). ADVANCE SC testait la forme sous-cutanée, plus pratique.
      - >-
        Résultat négatif : pas de supériorité sur le placebo. Fait notable, le
        taux de réponse sous placebo était inhabituellement élevé et celui sous
        efgartigimod plus bas qu'attendu, ce qui brouille l'interprétation et
        illustre la difficulté des essais dans le PTI (fluctuation spontanée des
        plaquettes, hétérogénéité des patients).
      - >-
        La leçon est méthodologique autant que clinique : un succès démontré par
        voie IV ne se transpose pas automatiquement à la voie sous-cutanée. En
        pratique, cela ne modifie pas la place actuelle des traitements du PTI.

  - type: reco
    titre: "Consensus d'experts sur la prise en charge du purpura thrombotique thrombocytopénique (PTT)"
    source: "Korean Journal of Internal Medicine · consensus d'experts"
    url: "https://pubmed.ncbi.nlm.nih.gov/42438901/"
    base_texte: abstract_seul
    resume: >-
      Consensus d'experts sur le diagnostic et la prise en charge du PTT,
      microangiopathie thrombotique liée à un déficit sévère en ADAMTS13. Il
      couvre les approches diagnostiques, les traitements initiaux (échanges
      plasmatiques, immunosuppression par rituximab, caplacizumab) et adjuvants,
      la prise en charge des formes réfractaires, le suivi de l'ADAMTS13 et le
      suivi au long cours, en adaptant les données internationales aux
      contraintes locales (accès au dosage ADAMTS13, remboursement).
    message_cle: >-
      Le trépied échanges plasmatiques + rituximab + caplacizumab structure la
      prise en charge du PTT, guidée par l'ADAMTS13 ; l'accès au dosage et aux
      molécules reste un enjeu organisationnel.
    contexte:
      - >-
        Le purpura thrombotique thrombocytopénique (PTT) est une microangiopathie
        thrombotique rare mais engageant le pronostic vital, liée à un déficit
        sévère (< 10 %) en ADAMTS13 — la protéase qui clive le facteur von
        Willebrand. Il associe thrombopénie, anémie hémolytique mécanique et
        atteintes d'organe (neurologique, cardiaque, rénale), et constitue une
        urgence diagnostique et thérapeutique.
      - >-
        La prise en charge a été transformée par les échanges plasmatiques
        (traitement historique salvateur), le rituximab (immunosuppression
        ciblant les auto-anticorps anti-ADAMTS13) puis le caplacizumab (anti-vWF)
        qui accélère la remontée plaquettaire et réduit les rechutes précoces.
        Le suivi de l'activité ADAMTS13 guide désormais la prévention des
        rechutes.
      - >-
        Ce consensus émane d'experts coréens et adapte les recommandations
        internationales aux contraintes locales (accès limité au dosage
        ADAMTS13, remboursement du rituximab, indisponibilité du caplacizumab) —
        un rappel que la disponibilité des outils conditionne la stratégie.
      - >-
        En France, le diagnostic et le suivi s'organisent autour du Centre
        national de référence des microangiopathies thrombotiques (CNR-MAT),
        avec un accès au dosage ADAMTS13 en urgence et au caplacizumab
        généralement plus large ; le document coréen reste utile pour sa
        synthèse pédagogique de la démarche.

