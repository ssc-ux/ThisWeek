# Numéro réel rédigé à partir des abstracts PubMed (brouillon, non relu).
# Périmètre : médecine interne (maladies auto-immunes et systémiques, vascularites,
# hématologie non maligne).
numero: 2
semaine: "27 juin au 3 juillet 2026"
date: 2026-07-03
brouillon: true
edito: >-
  Semaine dense et très « médecine interne » : une recommandation majeure sur
  le traitement du lupus, deux essais négatifs utiles (Horton, PTI) qui
  recadrent les attentes, un signal positif dans la maladie de Behçet, et un
  consensus sur le purpura thrombotique thrombocytopénique.

items:
  - type: reco
    titre: "Recommandation ACR 2025 pour le traitement du lupus systémique (hors atteinte rénale)"
    source: "Arthritis & Rheumatology · American College of Rheumatology"
    url: "https://pubmed.ncbi.nlm.nih.gov/41187097/"
    base_texte: abstract_seul
    resume: >-
      Recommandation de l'ACR (méthodologie GRADE, accord ≥ 70 % du panel) sur
      le traitement du lupus non rénal, applicable à l'adulte et à l'enfant (la
      néphrite lupique fait l'objet d'un texte séparé). Trois axes forts :
      hydroxychloroquine pour tous, limitation de la durée de la corticothérapie,
      et introduction précoce des immunosuppresseurs conventionnels et/ou des
      biothérapies pour obtenir et maintenir un contrôle de l'inflammation
      (rémission ou faible activité), réduire la morbimortalité et les toxicités
      médicamenteuses.
    ce_qui_change:
      reference: "pratiques centrées sur la corticothérapie"
      points:
        - "Hydroxychloroquine posée comme traitement de fond universel."
        - "Corticothérapie à limiter dans le temps, au profit d'une introduction
          plus précoce des immunosuppresseurs et biothérapies."
    message_cle: >-
      Dans le lupus : hydroxychloroquine pour tous, épargne cortisonique, et
      immunosuppression/biothérapie précoce pour viser la rémission ou une
      faible activité.
    contexte: >-
      Recommandation nord-américaine de niveau de preuve élevé. Cohérente avec
      les recommandations EULAR ; à confronter aux pratiques françaises et à la
      disponibilité/AMM des biothérapies. Ne couvre pas la néphrite lupique.

  - type: essai
    titre: "Sécukinumab dans l'artérite à cellules géantes (Horton) : essai négatif (GCAptAIN)"
    source: "NEJM Evidence · essai de phase 3"
    url: "https://pubmed.ncbi.nlm.nih.gov/42234457/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 3 randomisé contre placebo chez des patients atteints
      d'artérite à cellules géantes (nouvelle ou en rechute). Le sécukinumab
      300 mg (avec décroissance des corticoïdes sur 26 semaines) n'a pas
      significativement amélioré la rémission soutenue à 52 semaines : 25,6 % vs
      16,9 % sous placebo (différence 8,7 points ; IC95 % −1,3 à 18,8 ;
      p = 0,09). Pas de bénéfice non plus à 150 mg. Effets indésirables graves
      un peu moins fréquents sous sécukinumab.
    message_cle: >-
      Le sécukinumab n'a pas fait la preuve de son efficacité dans l'artérite à
      cellules géantes — le tocilizumab reste la biothérapie d'épargne
      cortisonique de référence.
    contexte: >-
      Essai négatif de bonne qualité, utile pour ne pas transposer aux
      vascularites tout succès de l'anti-IL-17A dans le psoriasis/SpA. Ne
      modifie pas la stratégie actuelle (corticoïdes ± tocilizumab).

  - type: essai
    titre: "Mufemilast dans la maladie de Behçet : essai de phase 2"
    source: "Annals of the Rheumatic Diseases · essai de phase 2"
    url: "https://pubmed.ncbi.nlm.nih.gov/41748391/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 2 randomisé contre placebo chez 90 patients atteints de
      maladie de Behçet avec aphtose buccale active. Le mufemilast (inhibiteur
      oral sélectif de la PDE4, 45 ou 60 mg × 2/j, 12 semaines) a réduit l'aire
      sous la courbe du nombre d'ulcères buccaux (différence −104,8 à −142,5 vs
      placebo ; p < 0,001), avec amélioration de la douleur et du délai de
      rémission. Effets indésirables liés à la PDE4 transitoires, arrêts rares,
      aucun effet grave lié au traitement.
    message_cle: >-
      Un inhibiteur oral de la PDE4 réduit l'aphtose buccale du Behçet en
      phase 2 — piste intéressante dans l'atteinte muqueuse, à confirmer en
      phase 3.
    contexte: >-
      Preuve de phase 2, critère centré sur l'aphtose buccale (pas sur les
      atteintes graves — oculaire, vasculaire, neurologique). À situer à côté de
      l'aprémilast (même classe) déjà évalué dans le Behçet.

  - type: essai
    titre: "Efgartigimod sous-cutané dans le purpura thrombopénique immunologique : essai négatif (ADVANCE SC)"
    source: "American Journal of Hematology · essai de phase 3"
    url: "https://pubmed.ncbi.nlm.nih.gov/41943179/"
    base_texte: abstract_seul
    resume: >-
      Essai de phase 3 chez 207 adultes atteints de PTI primaire (plaquettes
      < 30 G/L, ≥ 1 traitement antérieur), randomisés 2:1 entre efgartigimod
      PH20 sous-cutané et placebo. La supériorité n'a pas été démontrée : réponse
      plaquettaire soutenue (≥ 50 G/L sur au moins 4 des 6 visites S19–24) chez
      13,7 % (efgartigimod) contre 16,2 % (placebo ; p = 0,51). Tolérance bonne
      et comparable. Réponses placebo plus élevées et réponses efgartigimod plus
      basses qu'attendu.
    message_cle: >-
      La forme sous-cutanée d'efgartigimod n'a pas confirmé son efficacité dans
      le PTI dans cet essai — résultat discordant avec la forme IV (ADVANCE IV),
      à interpréter avec prudence.
    contexte: >-
      Essai négatif contrastant avec le succès antérieur de l'efgartigimod IV :
      taux de réponse placebo inhabituellement élevé, ce qui complique
      l'interprétation. Rappelle la prudence avant d'extrapoler d'une voie
      d'administration à l'autre.

  - type: reco
    titre: "Consensus d'experts sur la prise en charge du purpura thrombotique thrombocytopénique (PTT)"
    source: "Korean Journal of Internal Medicine · consensus d'experts"
    url: "https://pubmed.ncbi.nlm.nih.gov/42438901/"
    base_texte: abstract_seul
    resume: >-
      Consensus d'experts sur le diagnostic et la prise en charge du PTT,
      microangiopathie thrombotique liée à un déficit sévère en ADAMTS13. Il
      couvre les approches diagnostiques, les traitements initiaux (échanges
      plasmatiques, immunosuppression par rituximab, caplacizumab) et adjuvants,
      la prise en charge des formes réfractaires, le suivi de l'ADAMTS13 et le
      suivi au long cours, en adaptant les données internationales aux
      contraintes locales (accès au dosage ADAMTS13, remboursement).
    message_cle: >-
      Le trépied échanges plasmatiques + rituximab + caplacizumab structure la
      prise en charge du PTT, guidée par l'ADAMTS13 ; l'accès au dosage et aux
      molécules reste un enjeu organisationnel.
    contexte: >-
      Consensus adapté au contexte coréen ; en France, le diagnostic et le suivi
      s'appuient sur le Centre de référence des microangiopathies thrombotiques
      (CNR-MAT), avec un accès généralement plus large au caplacizumab.

