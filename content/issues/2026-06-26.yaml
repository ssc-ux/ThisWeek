# Numéro réel rédigé à partir des abstracts PubMed (brouillon, non relu).
# Périmètre : médecine interne (maladies auto-immunes et systémiques, vascularites,
# hématologie non maligne, MTEV…).
numero: 1
semaine: "20 au 26 juin 2026"
date: 2026-06-26
brouillon: true
edito: >-
  Semaine calme pour la médecine interne : les données marquantes sont
  surtout observationnelles — survie et causes de décès dans le lupus,
  tolérance au long cours des inhibiteurs de JAK, et une synthèse d'une
  vascularite cutanée rare.

items:
  - type: meta
    titre: "Mortalité et survie dans le lupus systémique : méta-analyse de cohortes (région MENA)"
    source: "Rheumatology International · revue systématique et méta-analyse"
    url: "https://pubmed.ncbi.nlm.nih.gov/42329420/"
    base_texte: abstract_seul
    resume: >-
      Méta-analyse de 12 cohortes (3 478 adultes lupiques de cinq pays de la
      région Moyen-Orient / Afrique du Nord). Mortalité toutes causes globale de
      9,9 % ; survie de 93,9 % à 5 ans, 90,0 % à 10 ans, puis 85,5 % à 15 ans et
      71,7 % à 20 ans. Principaux facteurs de mortalité : atteinte rénale,
      maladie cardiovasculaire, infections, HTA, diabète, anomalies
      hématologiques et sexe masculin. L'infection était la première cause de
      décès. Une exposition cumulée élevée aux corticoïdes et au
      cyclophosphamide était associée à une surmortalité, l'hydroxychloroquine
      et l'azathioprine apparaissant protectrices.
    message_cle: >-
      Le pronostic à long terme du lupus reste dominé par les complications
      rénales, cardiovasculaires et infectieuses ; l'hydroxychloroquine reste un
      pilier, et l'épargne cortisonique un objectif de survie.
    contexte:
      - >-
        Le lupus systémique est une maladie auto-immune emblématique de la
        médecine interne, à forte prédominance féminine et à présentation très
        variable (cutanée, articulaire, rénale, hématologique, neurologique).
        Son pronostic s'est nettement amélioré en un demi-siècle, mais persiste
        une surmortalité par rapport à la population générale, avec une
        « double peine » : décès précoces liés à l'activité de la maladie et aux
        infections, décès plus tardifs de cause cardiovasculaire.
      - >-
        Cette méta-analyse agrège des cohortes de la région Moyen-Orient /
        Afrique du Nord, zone jusqu'ici peu représentée dans la littérature, où
        l'ethnie et l'accès aux soins peuvent moduler le pronostic. Elle ne
        teste pas un traitement : c'est une photographie de la survie et des
        causes de décès, utile pour hiérarchiser la surveillance.
      - >-
        Les enseignements rejoignent la littérature internationale et les
        recommandations récentes : l'atteinte rénale et cardiovasculaire pèse
        lourd, l'infection est une cause majeure de décès (d'où l'importance de
        la vaccination et de la prudence sur l'immunosuppression), et la
        toxicité cumulée des corticoïdes est un facteur de risque modifiable —
        argument de plus pour l'épargne cortisonique et le maintien de
        l'hydroxychloroquine, deux axes forts des recommandations actuelles.
      - >-
        Limites : preuve observationnelle, forte hétérogénéité (I² ≈ 90 %) et
        estimations à long terme sensibles à l'exclusion d'une seule étude. Les
        chiffres absolus ne sont pas directement transposables à la France, mais
        les déterminants pronostiques le sont.

  - type: essai
    titre: "Upadacitinib vs adalimumab dans la polyarthrite rhumatoïde : données à 7 ans (SELECT-COMPARE)"
    source: "RMD Open · extension à long terme d'un essai de phase 3"
    impact_factor: 5
    url: "https://pubmed.ncbi.nlm.nih.gov/42342288/"
    base_texte: abstract_seul
    resume: >-
      Suivi à 7 ans de l'essai SELECT-COMPARE (upadacitinib 15 mg/j vs
      adalimumab, sur méthotrexate). L'efficacité (rémission CDAI, DAS28-CRP)
      est maintenue jusqu'à 372 semaines dans les deux bras, y compris après
      switch des non-répondeurs. La tolérance de l'upadacitinib reste conforme
      aux analyses antérieures, mais avec des taux numériquement plus élevés de
      zona, d'élévation des CPK, de cancers cutanés non mélaniques, de
      lymphopénie et d'atteintes hépatiques.
    message_cle: >-
      Au long cours, le signal de tolérance des inhibiteurs de JAK (zona,
      cancers cutanés, cytopénies) se confirme — à intégrer dans la surveillance
      chez tout patient traité par JAKi, au-delà de la seule polyarthrite.
    contexte:
      - >-
        Les inhibiteurs de JAK (JAKi) sont des traitements de fond synthétiques
        ciblés, oraux, utilisés dans plusieurs maladies auto-immunes que
        l'interniste prend en charge ou co-gère. Depuis l'essai de sécurité
        ORAL Surveillance (tofacitinib), un signal de risque — événements
        cardiovasculaires, thromboses, cancers, zona — pèse sur toute la classe
        et impose une sélection prudente des patients (âge, tabac, antécédents
        cardiovasculaires ou néoplasiques).
      - >-
        SELECT-COMPARE compare, dans la polyarthrite rhumatoïde en échec de
        méthotrexate, l'upadacitinib à l'adalimumab (un anti-TNF de référence).
        L'intérêt d'un suivi à 7 ans n'est pas l'efficacité — attendue et
        maintenue — mais la tolérance au long cours, seule à même de capter des
        événements rares et cumulatifs.
      - >-
        Le texte intégral rappelle que les recommandations ACR et EULAR placent
        le méthotrexate en première ligne, les biothérapies en deuxième, les
        JAKi étant une alternative après échec, sous réserve d'un dépistage et
        d'une surveillance des facteurs de risque (infection, événements
        cardiovasculaires, thrombose, cancers).
      - >-
        Pour l'interniste, la polyarthrite rhumatoïde relève surtout du
        rhumatologue, mais ce signal de tolérance concerne directement l'usage
        des JAKi dans d'autres indications d'auto-immunité. Limites : extension
        d'essai sur population sélectionnée, avec biais d'attrition ; les taux
        « numériquement plus élevés » ne sont pas nécessairement significatifs.

  - type: meta
    titre: "Vascularite éosinophilique cutanée récidivante : revue systématique"
    source: "Acta Dermato-Venereologica · revue systématique"
    url: "https://pubmed.ncbi.nlm.nih.gov/42343578/"
    base_texte: abstract_seul
    resume: >-
      Synthèse de 20 rapports (24 cas) d'une vascularite cutanée rare. Tableau
      typique : purpura prurigineux récidivant des membres inférieurs,
      éosinophilie périphérique fréquente, ANCA négatifs dans tous les cas
      rapportés, histologie de vascularite riche en éosinophiles. Les
      corticoïdes systémiques induisent souvent une amélioration, mais les
      rechutes à la décroissance ou à l'arrêt sont fréquentes.
    message_cle: >-
      Devant un purpura prurigineux récidivant avec éosinophilie et ANCA
      négatifs, évoquer cette entité — et rechercher systématiquement une
      atteinte extracutanée avant de conclure à une forme purement cutanée.
    contexte:
      - >-
        Les vascularites cutanées à éosinophiles sont un champ de diagnostic
        différentiel classiquement interniste : il faut distinguer une atteinte
        purement cutanée d'une vascularite systémique (notamment la
        granulomatose éosinophilique avec polyangéite, ex-Churg-Strauss), d'une
        cause médicamenteuse, parasitaire ou d'un syndrome hyperéosinophilique.
      - >-
        La vascularite éosinophilique cutanée récidivante est une entité rare,
        décrite jusqu'ici par cas isolés, ce qui explique l'absence de critères
        diagnostiques consensuels et de stratégie thérapeutique établie. Cette
        revue systématique agrège les cas publiés pour dégager un profil
        reconnaissable et affiner un cadre diagnostique provisoire.
      - >-
        Le message pratique est diagnostique : devant un purpura prurigineux
        récidivant des membres inférieurs avec éosinophilie et ANCA négatifs,
        penser à cette entité, mais surtout éliminer une atteinte extracutanée
        (poumon, nerf, cœur, rein) avant de conclure à une forme bénigne
        purement cutanée.
      - >-
        Niveau de preuve faible par construction : cas rapportés hétérogènes,
        suivi incomplet, biais de publication. À utiliser comme aide à la
        reconnaissance du tableau, pas comme référentiel thérapeutique.
