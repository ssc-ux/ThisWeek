# Numéro réel rédigé à partir des abstracts PubMed, sans relecture humaine.
numero: 6
semaine: "6 au 12 juin 2026"
date: 2026-06-12
edito: >-
  La thrombose associée au cancer (rivaroxaban vs HBPM), la vaccination contre le
  zona chez les patients immunodéprimés, et comment désescalader une biothérapie
  sans rallumer la maladie.

items:
  - type: meta
    titre: "Thrombose associée au cancer : rivaroxaban vs HBPM, méta-analyse de 19 153 patients"
    source: "Clinical and Applied Thrombosis/Hemostasis · revue systématique et méta-analyse"
    url: "https://pubmed.ncbi.nlm.nih.gov/42273726/"
    base_texte: abstract_seul
    resume: >-
      Revue systématique et méta-analyse (25 études, 19 153 patients) comparant le
      rivaroxaban (anticoagulant oral direct) à l'héparine de bas poids
      moléculaire (HBPM) dans le traitement de la maladie thromboembolique veineuse
      associée au cancer. Le rivaroxaban réduit le risque de récidive de MTEV
      (RR 0,88 ; IC95 0,78-0,99 ; p = 0,03) et la mortalité toutes causes (RR 0,83 ;
      IC95 0,69-0,99 ; p = 0,04), sans différence significative sur les autres
      critères (dont les hémorragies). La certitude des preuves (GRADE) va d'élevée
      à très faible selon les critères.
    message_cle: >-
      Dans la thrombose associée au cancer, le rivaroxaban fait au moins aussi bien
      que l'HBPM sur les récidives, avec un signal de moindre mortalité — une
      option orale à considérer, en tenant compte du site tumoral et du risque
      hémorragique.
    contexte:
      - >-
        La thrombose associée au cancer est fréquente et grave, et sa prise en
        charge revient souvent à l'interniste. L'HBPM a longtemps été le standard
        (essai CLOT), avant que les anticoagulants oraux directs (rivaroxaban,
        apixaban, édoxaban) ne s'imposent comme alternatives dans les essais
        récents (SELECT-D, Caravaggio…).
      - >-
        Cette méta-analyse conforte la non-infériorité (voire un avantage) du
        rivaroxaban sur les récidives et un signal de mortalité, sans surcroît
        hémorragique démontré ici. La prudence reste toutefois de mise pour les
        cancers digestifs et urothéliaux, où les AOD majorent le risque de
        saignement — d'où une décision à individualiser.
      - >-
        Limites : hétérogénéité des études incluses, certitude GRADE variable, et
        besoin d'essais randomisés de plus grande ampleur pour confirmer le profil
        de sécurité.

  - type: essai
    titre: "Vaccin recombinant contre le zona chez les patients sclérodermiques immunodéprimés : immunogène et bien toléré"
    source: "Rheumatology (Oxford) · sous-analyse d'essai randomisé contrôlé"
    impact_factor: 5
    url: "https://pubmed.ncbi.nlm.nih.gov/42261247/"
    base_texte: abstract_seul
    resume: >-
      Sous-analyse d'un essai randomisé contrôlé : réponse au vaccin recombinant
      contre le zona (RZV) chez 76 patients atteints de sclérodermie systémique
      sous immunosuppresseurs, comparés à 304 témoins sains. Séroconversion élevée
      mais significativement plus faible chez les patients (92,6 % vs 99,7 % ;
      p = 0,001), avec des titres d'anticorps (GMC 5,81 vs 12,6) et un facteur
      d'augmentation moindres ; immunité cellulaire comparable. Bonne tolérance
      (réactions locales même moins fréquentes), activité de la maladie stable.
    message_cle: >-
      Le vaccin recombinant contre le zona est immunogène et bien toléré chez les
      patients sclérodermiques immunodéprimés, malgré une réponse humorale un peu
      moindre — un argument concret pour vacciner cette population à risque.
    contexte:
      - >-
        Le zona est plus fréquent et plus grave sous immunosuppression, situation
        quotidienne en médecine interne. Le RZV, vaccin recombinant (non vivant),
        est utilisable chez l'immunodéprimé, contrairement au vaccin vivant atténué.
      - >-
        Cette étude conforte l'intérêt de la vaccination anti-zona dans les
        connectivites traitées, en cohérence avec les recommandations vaccinales
        françaises pour les patients immunodéprimés.

  - type: meta
    titre: "Désescalade des biothérapies dans la polyarthrite rhumatoïde : réduire la dose plutôt qu'arrêter"
    source: "Seminars in Arthritis and Rheumatism · revue systématique et méta-analyse"
    impact_factor: 5
    url: "https://pubmed.ncbi.nlm.nih.gov/42269230/"
    base_texte: abstract_seul
    resume: >-
      Revue systématique et méta-analyse (11 études, 2861 patients) comparant
      l'ARRÊT complet vs la RÉDUCTION de dose des biothérapies (bDMARD) chez des
      patients en rémission stable de polyarthrite rhumatoïde. L'arrêt complet
      multiplie par ~2 le risque de poussée (RR 2,13 ; IC95 1,74-2,61) par rapport
      à la réduction/maintien ; le risque est moindre dans la PR précoce (< 2 ans,
      RR 1,62) que dans la PR établie (RR 2,31). En cas de poussée, la reprise du
      traitement est efficace dans 87,5 % des cas, avec récupération en ~12
      semaines ; progression radiographique minime.
    message_cle: >-
      Chez un patient en rémission stable, réduire la dose de biothérapie expose à
      moins de poussées que l'arrêt complet ; l'arrêt reste envisageable (surtout
      PR précoce) mais avec un risque de rechute plus élevé, généralement
      réversible à la reprise.
    contexte:
      - >-
        La désescalade d'un traitement immunosuppresseur en rémission est une
        question transversale (maladies systémiques, rhumatismes), avec un double
        objectif : limiter la toxicité et le coût sans rallumer la maladie.
      - >-
        Le message est pratique : préférer une réduction de dose progressive à
        l'arrêt sec, informer le patient du risque de poussée et de sa
        réversibilité. Données issues d'essais hétérogènes, à individualiser selon
        l'ancienneté et la profondeur de la rémission.
