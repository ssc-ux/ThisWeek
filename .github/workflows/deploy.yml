name: Construire et déployer le site

on:
  push:
    branches: [main]
  workflow_dispatch:
# Le rafraîchissement hebdomadaire (veille + nouveau numéro) est piloté par
# .github/workflows/weekly-issue.yml (chaque lundi). Ce workflow-ci ne fait que
# (re)déployer à chaque push sur main.

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jinja2 markdown
      - name: Collecter la veille PubMed (7 derniers jours)
        run: python3 pipeline/fetch_pubmed.py || echo "PubMed indisponible — le site sera construit sans la page veille à jour"
      - run: python3 site/build.py
      - name: Déployer sur la branche gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Déploiement du site (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
